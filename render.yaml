services:
  - type: web
    name: job-hunter-api
    env: python
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-hunter-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: UPLOAD_DIR
        value: "/tmp/uploads"

databases:
  - name: job-hunter-db
    plan: free
